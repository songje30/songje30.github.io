<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>스탬프 투어</title>


<style>

*{
    box-sizing:border-box;
}


body{

    margin:0;
    padding:20px;

    font-family:
    Arial,
    sans-serif;

    background:#f4f4f4;

}



h1{

    text-align:center;

}



#progress{

    background:white;

    padding:15px;

    border-radius:15px;

    text-align:center;

    font-size:20px;

    margin-bottom:20px;

    font-weight:bold;

}



#stampBook{


    display:grid;

    grid-template-columns:
    repeat(2,1fr);

    gap:15px;


}



.stamp{

    background:white;

    height:120px;

    border-radius:20px;

    display:flex;

    align-items:center;

    justify-content:center;

    box-shadow:
    0 3px 8px #ddd;

    overflow:hidden;

    font-size:24px;

    color:#aaa;

}


.stamp.checked{

    background:#fff3f3;

}


.stampImage{

    width:90px;

    height:90px;

    object-fit:contain;

}


.emptyStamp{

    color:#bbb;

}


</style>


</head>



<body>



<h1>
🎖 스탬프북
</h1>



<div id="progress">

</div>



<div id="stampBook">


</div>





<script>


// ------------------------
// 설정
// ------------------------

const TOTAL = 20;


// ------------------------
// QR 번호 확인
// ------------------------


const params =
new URLSearchParams(
    location.search
);


const qrStamp =
params.get("stamp");




// ------------------------
// 저장 데이터 가져오기
// ------------------------


let stamps =
JSON.parse(

    localStorage.getItem(
        "stampBook"
    )

    ||

    "[]"

);




// ------------------------
// QR 방문 처리
// ------------------------


if(qrStamp){


    let id =
    String(qrStamp)
    .padStart(2,"0");



    if(
        !stamps.includes(id)
    ){

        stamps.push(id);


        localStorage.setItem(

            "stampBook",

            JSON.stringify(stamps)

        );


    }



    // URL 정리

    history.replaceState(

        null,

        "",

        location.pathname

    );


}




// ------------------------
// 스탬프 화면 생성
// ------------------------


const book =
document.getElementById(
    "stampBook"
);



let count=0;



for(
let i=1;
i<=TOTAL;
i++
){


    let id =
    String(i)
    .padStart(2,"0");



    let checked =
    stamps.includes(id);



    if(checked)
    {
        count++;
    }




    book.innerHTML += `


    <div class="stamp 
    ${checked?'checked':''}">


        <input

        type="checkbox"

        ${checked?'checked':''}

        disabled>


        ${id}번 스탬프


    </div>


    `;


}




// ------------------------
// 진행률
// ------------------------


document.getElementById(
"progress"
)
.innerHTML =

`
획득 :
${count} / ${TOTAL}
`;



</script>



</body>

</html>
