<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스탬프 투어</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 로그인 화면 -->
    <div id="loginPage">

        <h1>🎖 스탬프 투어</h1>

        <div class="loginBox">

            <h2>참가자 로그인</h2>

            <input
                type="text"
                id="name"
                placeholder="이름"
            >

            <input
                type="tel"
                id="phone"
                placeholder="전화번호 (01012345678)"
            >

            <button id="loginBtn">
                로그인
            </button>

            <p id="loginMessage"></p>

        </div>

    </div>


    <!-- 스탬프북 화면 -->
    <div id="stampPage" style="display:none;">

        <h1>🎖 스탬프북</h1>

        <div id="userBar">

            <h3 id="userName"></h3>

            <button id="logoutBtn">
                로그아웃
            </button>

        </div>

        <div id="progress">
            획득 스탬프 : 0 / 4
        </div>

        <div id="stampBook">
            <!-- JavaScript에서 생성 -->
        </div>

    </div>

    <script type="module" src="script.js"></script>

</body>
</html>
