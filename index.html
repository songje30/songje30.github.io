<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>스탬프 투어</title>


<style>

*{
    box-sizing:border-box;
}


body{

    margin:0;
    padding:20px;

    font-family:
    Arial,
    sans-serif;

    background:#f4f4f4;

}



h1{

    text-align:center;

}



#progress{

    background:white;

    padding:15px;

    border-radius:15px;

    text-align:center;

    font-size:20px;

    margin-bottom:20px;

    font-weight:bold;

}



#stampBook{


    display:grid;

    grid-template-columns:
    repeat(2,1fr);

    gap:15px;


}



.stamp{

    background:white;

    height:150px;

    border-radius:20px;

    display:flex;

    align-items:center;

    justify-content:center;

    box-shadow:0 3px 8px #ddd;

    overflow:hidden;

}


.stamp.checked{

    background:#fff3f3;

}


.stampImage{
    width:130px;
    height:130px;
    object-fit:cover;
    border-radius:50%;
}


.emptyStamp{

    color:#bbb;

}


</style>


</head>



<body>



<h1>
🎖 스탬프북
</h1>



<div id="progress">

</div>



<div id="stampBook">


</div>





<script src="script.js"></script>



</body>

</html>
